# RAG-Tender Assistant Phase 2 验证配置文件
# 使用方法：把下面的 YOUR_xxx_KEY 替换为真实的 API Key 后即可运行验证脚本

# ==================== LLM 配置（DeepSeek）====================
llm:
  base_url: "https://api.deepseek.com/v1"
  api_key: "YOUR_DEEPSEEK_KEY"
  model: "deepseek-chat"
  # 可选：deepseek-reasoner (R1 推理模型，更慢但更强)
  temperature: 0.1
  max_tokens: 4096

# ==================== Embedding 配置（硅基流动 BGE-M3）====================
embedding:
  base_url: "https://api.siliconflow.cn/v1"
  api_key: "YOUR_SILICONFLOW_KEY"
  model: "BAAI/bge-m3"
  dimension: 1024

# ==================== Vision 配置（硅基流动 Nex-N2-Pro）====================
vision:
  base_url: "https://api.siliconflow.cn/v1"
  api_key: "YOUR_SILICONFLOW_KEY"
  model: "nex-agi/Nex-N2-Pro"
  # 备选视觉模型：如果 Nex-N2-Pro 不支持 image_url，切换到智谱 GLM-4V
  fallback_model: "glm-4v"

# ==================== RAG-Anything 配置====================
raganything:
  # 解析后知识图谱/向量库的存储目录
  workspace_dir: "./rag_workspace"
  # 文档块大小（字符数）
  chunk_size: 512
  # 块重叠（字符数）
  chunk_overlap: 50
  # 检索 top-k
  top_k: 10

# ==================== 标书样本路径====================
documents:
  # Markdown 原始样本
  markdown_path: "../samples/控制柜配电柜变频柜采购招标公告_样本.md"
  # PDF 样本（用于多模态解析测试）
  pdf_path: "../samples/控制柜配电柜变频柜采购招标公告_样本.pdf"
